    <meta name="description" content="Join our field or support teams in facilitation, logistics, health, education, or communication." />
    <script>
      (() => {
        try {
          const saved = window.localStorage.getItem('lhupc-language');
          const detected = (window.navigator.language || '').toLowerCase().startsWith('fr') ? 'fr' : 'en';
          document.documentElement.lang = saved || detected;
        } catch {
          document.documentElement.lang = 'en';
        }
      })();
    </script>
